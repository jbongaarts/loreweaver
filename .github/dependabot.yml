version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    groups:
      runtime-native-sensitive:
        patterns:
          - "better-sqlite3"
          - "@types/better-sqlite3"
      model-provider-sdks:
        patterns:
          - "@anthropic-ai/*"
      # PDF extraction runtime. Kept separate from generation tooling so a
      # risky pdfjs-dist major (e.g. 5.x -> 6.x lifecycle API removals that
      # break the SRD importer) cannot ride along with routine pdfkit updates.
      # Patch/minor only here; majors are ignored below and handled as a
      # dedicated migration bead.
      pdf-extraction-tooling:
        dependency-type: development
        patterns:
          - "pdfjs-dist"
        update-types:
          - "minor"
          - "patch"
      # PDF generation tooling (pdfkit and its types). Patch/minor only.
      pdf-generation-tooling:
        dependency-type: development
        patterns:
          - "pdfkit"
          - "@types/pdfkit"
        update-types:
          - "minor"
          - "patch"
      dev-tooling:
        dependency-type: development
        patterns:
          - "@biomejs/*"
          - "@types/node"
          - "tsx"
          - "typescript"
          - "vitest"
          - "@vitest/*"
    ignore:
      - dependency-name: "better-sqlite3"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@biomejs/biome"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      # pdfjs-dist majors remove/change extraction lifecycle APIs the SRD
      # importer depends on; open them only as an intentional migration bead.
      - dependency-name: "pdfjs-dist"
        update-types:
          - "version-update:semver-major"
      # pdfkit majors can change PDF generation output; review deliberately
      # rather than as a routine grouped PR.
      - dependency-name: "pdfkit"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: "America/Chicago"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
